<!-- @dsCard group="Brand" viewport="700x180" name="Iconography — Lucide" subtitle="Lucide, 16px, 1.5–2px stroke; inherits currentColor" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
  .grid{display:flex;flex-wrap:wrap;gap:8px;}
  .cell{display:flex;flex-direction:column;align-items:center;gap:6px;width:76px;padding:10px 4px;border:1px solid var(--border);border-radius:var(--radius-lg);}
  .cell svg{width:20px;height:20px;stroke-width:2;color:var(--foreground);}
  .cell span{font-size:10px;color:var(--muted-foreground);font-family:var(--font-mono);}
  .note{font-size:12px;color:var(--muted-foreground);margin-top:14px;}
</style></head>
<body>
<div class="grid">
  <div class="cell"><i data-lucide="layout-dashboard"></i><span>dashboard</span></div>
  <div class="cell"><i data-lucide="package"></i><span>products</span></div>
  <div class="cell"><i data-lucide="trending-up"></i><span>sales</span></div>
  <div class="cell"><i data-lucide="download"></i><span>downloads</span></div>
  <div class="cell"><i data-lucide="heart"></i><span>wishlist</span></div>
  <div class="cell"><i data-lucide="settings"></i><span>settings</span></div>
  <div class="cell"><i data-lucide="plus"></i><span>new</span></div>
  <div class="cell"><i data-lucide="panel-left"></i><span>sidebar</span></div>
  <div class="cell"><i data-lucide="chevron-down"></i><span>chevron</span></div>
  <div class="cell"><i data-lucide="search"></i><span>search</span></div>
  <div class="cell"><i data-lucide="ellipsis"></i><span>more</span></div>
  <div class="cell"><i data-lucide="sparkles"></i><span>ai</span></div>
</div>
<p class="note">Icon set: <b>Lucide</b> (from lucide-react in the source). Default 16px in-app (20px shown here), 2px stroke, no fill, color inherits from text. No emoji or unicode glyphs used as icons.</p>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>lucide.createIcons();</script>
</body></html>
