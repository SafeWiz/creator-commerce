<!-- @dsCard group="Spacing" viewport="700x170" name="Spacing scale" subtitle="0.25rem base unit — dense, utilitarian rhythm" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px 20px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:7px;}
  .bar{background:var(--primary);height:14px;border-radius:2px;}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);width:150px;}
</style></head>
<body>
  <div class="row"><span class="tok">--space-1 · 4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tok">--space-2 · 8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tok">--space-3 · 12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tok">--space-4 · 16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tok">--space-6 · 24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tok">--space-8 · 32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tok">--space-12 · 48px</span><div class="bar" style="width:48px"></div></div>
</body></html>
