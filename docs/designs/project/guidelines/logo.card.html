<!-- @dsCard group="Brand" viewport="700x180" name="Logo" subtitle="Interlocking CC — neutral + green monogram (Creator + Commerce)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px 24px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
  .row{display:flex;align-items:center;gap:32px;flex-wrap:wrap;}
  .lockup{display:flex;align-items:center;gap:12px;}
  .word{font-family:var(--font-heading);font-weight:500;font-size:22px;letter-spacing:-.02em;}
  .word b{font-weight:700;}
  .dark{background:var(--foreground);border-radius:var(--radius-lg);padding:14px 18px;display:flex;align-items:center;gap:12px;}
  .dark .word{color:var(--background);}
  .sizes{display:flex;align-items:flex-end;gap:18px;margin-top:16px;}
  .cap{font-family:var(--font-mono);font-size:10px;color:var(--muted-foreground);text-align:center;margin-top:6px;}
  .si{display:flex;flex-direction:column;align-items:center;}
</style></head>
<body>
<div class="row">
  <div class="lockup">
    <svg width="40" height="40" viewBox="0 0 48 48" fill="none"><path d="M28 12 A12 12 0 1 0 28 36" stroke="var(--foreground)" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M32 16 A12 12 0 1 1 32 32" stroke="var(--primary)" stroke-width="4.5" stroke-linecap="round" fill="none"/></svg>
    <span class="word">Creator<b>Commerce</b></span>
  </div>
  <div class="dark">
    <svg width="34" height="34" viewBox="0 0 48 48" fill="none"><path d="M28 12 A12 12 0 1 0 28 36" stroke="var(--background)" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M32 16 A12 12 0 1 1 32 32" stroke="var(--sidebar-primary)" stroke-width="4.5" stroke-linecap="round" fill="none"/></svg>
    <span class="word">Creator<b>Commerce</b></span>
  </div>
</div>
<div class="sizes">
  <div class="si"><svg width="32" height="32" viewBox="0 0 48 48" fill="none"><path d="M28 12 A12 12 0 1 0 28 36" stroke="var(--foreground)" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M32 16 A12 12 0 1 1 32 32" stroke="var(--primary)" stroke-width="4.5" stroke-linecap="round" fill="none"/></svg><span class="cap">32px</span></div>
  <div class="si"><svg width="20" height="20" viewBox="0 0 48 48" fill="none"><path d="M28 12 A12 12 0 1 0 28 36" stroke="var(--foreground)" stroke-width="5.5" stroke-linecap="round" fill="none"/><path d="M32 16 A12 12 0 1 1 32 32" stroke="var(--primary)" stroke-width="5.5" stroke-linecap="round" fill="none"/></svg><span class="cap">favicon</span></div>
  <div class="si"><svg width="20" height="20" viewBox="0 0 48 48" fill="none" style="color:var(--muted-foreground)"><path d="M28 12 A12 12 0 1 0 28 36" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none"/><path d="M32 16 A12 12 0 1 1 32 32" stroke="currentColor" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.55"/></svg><span class="cap">mono</span></div>
</div>
<p style="font-size:11px;color:var(--muted-foreground);margin:14px 0 0;font-family:var(--font-mono)">assets/logo.svg · assets/logo-mono.svg · pairs with Roboto wordmark</p>
</body></html>
