<!-- @dsCard group="Brand" viewport="700x160" name="Wordmark" subtitle="No logo in source — brand shown as type (Roboto medium)" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:22px 24px;background:var(--background);color:var(--foreground);font-family:var(--font-sans);}
  .mark{display:inline-flex;align-items:center;gap:10px;}
  .glyph{width:32px;height:32px;border-radius:var(--radius-lg);background:var(--primary);color:var(--primary-foreground);display:flex;align-items:center;justify-content:center;font-family:var(--font-heading);font-weight:700;font-size:18px;}
  .word{font-family:var(--font-heading);font-weight:500;font-size:22px;letter-spacing:-.02em;}
  .word b{font-weight:700;}
  .note{font-size:12px;color:var(--muted-foreground);margin-top:16px;max-width:60ch;line-height:1.5;}
</style></head>
<body>
  <div class="mark">
    <svg width="34" height="34" viewBox="0 0 48 48" fill="none"><path d="M28 12 A12 12 0 1 0 28 36" stroke="var(--foreground)" stroke-width="4.5" stroke-linecap="round" fill="none"/><path d="M32 16 A12 12 0 1 1 32 32" stroke="var(--primary)" stroke-width="4.5" stroke-linecap="round" fill="none"/></svg>
    <span class="word">Creator<b>Commerce</b></span>
  </div>
  <p class="note">The brand mark is the interlocking <b>CC</b> monogram — one neutral C (Creator) and one green C (Commerce) — paired with the Roboto wordmark ("Creator" medium + "Commerce" bold). See <code>assets/logo.svg</code> and the Logo card.</p>
</body></html>
