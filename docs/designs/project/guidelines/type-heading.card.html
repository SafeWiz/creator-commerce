<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px 20px;background:var(--background);color:var(--foreground);font-family:var(--font-heading);}
  .h1{font-size:30px;font-weight:500;letter-spacing:-.02em;line-height:1.15;}
  .h2{font-size:24px;font-weight:500;letter-spacing:-.02em;margin-top:6px;}
  .h3{font-size:18px;font-weight:500;margin-top:6px;}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);margin-top:12px;}
</style></head>
<body>
  <div class="h1">Sell your first digital product</div>
  <div class="h2">Revenue this month</div>
  <div class="h3">Product details</div>
  <div class="tok">Roboto · 500 medium · tracking -0.02em — not bold. Used via .font-heading / CardTitle.</div>
</body></html>
