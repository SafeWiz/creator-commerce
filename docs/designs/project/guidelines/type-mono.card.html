<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:18px 20px;background:var(--background);color:var(--foreground);font-family:var(--font-mono);}
  .kpi{font-size:36px;font-weight:500;letter-spacing:-.02em;}
  .row{display:flex;gap:28px;align-items:baseline;margin-top:6px;}
  .price{font-size:18px;}
  .muted{color:var(--muted-foreground);font-size:13px;}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--muted-foreground);margin-top:14px;}
</style></head>
<body>
  <div class="kpi">$4,280.00</div>
  <div class="row">
    <span class="price">$29.00</span>
    <span class="muted">142 units</span>
    <span class="muted">ord_8fA2c1</span>
  </div>
  <div class="tok">Geist Mono · used for money, counts, IDs and any tabular figure.</div>
</body></html>
