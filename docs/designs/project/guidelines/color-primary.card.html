<!-- @dsCard group="Colors" viewport="700x150" name="Brand green (primary)" subtitle="Green ramp — primary actions, active nav, published status" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body{margin:0;padding:16px;background:var(--background);font-family:var(--font-sans);}
  .ramp{display:flex;gap:10px;}
  .sw{flex:1;display:flex;flex-direction:column;gap:6px;}
  .chip{height:64px;border-radius:var(--radius-lg);box-shadow:var(--ring-card);}
  .name{font-size:11px;font-weight:600;color:var(--foreground);}
  .tok{font-size:10px;color:var(--muted-foreground);font-family:var(--font-mono);}
</style></head>
<body>
<div class="ramp">
  <div class="sw"><div class="chip" style="background:var(--green-50)"></div><span class="name">50</span><span class="tok">--green-50</span></div>
  <div class="sw"><div class="chip" style="background:var(--green-100)"></div><span class="name">100</span><span class="tok">--green-100</span></div>
  <div class="sw"><div class="chip" style="background:var(--green-300)"></div><span class="name">300</span><span class="tok">--green-300</span></div>
  <div class="sw"><div class="chip" style="background:var(--green-500)"></div><span class="name">500</span><span class="tok">--green-500</span></div>
  <div class="sw"><div class="chip" style="background:var(--green-600);outline:2px solid var(--foreground);outline-offset:2px"></div><span class="name">600 · primary</span><span class="tok">--primary</span></div>
  <div class="sw"><div class="chip" style="background:var(--green-700)"></div><span class="name">700</span><span class="tok">--green-700</span></div>
  <div class="sw"><div class="chip" style="background:var(--green-900)"></div><span class="name">900</span><span class="tok">--green-900</span></div>
</div>
</body></html>
