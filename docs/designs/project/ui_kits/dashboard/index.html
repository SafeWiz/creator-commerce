<!-- @startingPoint section="Screens" subtitle="Full creator dashboard shell with sidebar + 3 screens" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Creator Commerce — Dashboard</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { height: 100%; margin: 0; }
  #root { height: 100vh; }
  .cc-tr:hover { background: color-mix(in oklch, var(--muted), transparent 50%); }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<script type="text/babel" src="AppShell.jsx"></script>
<script type="text/babel" src="DashboardScreen.jsx"></script>
<script type="text/babel" src="ProductsScreen.jsx"></script>
<script type="text/babel" src="ProductEditScreen.jsx"></script>
<script type="text/babel">
  const NS = window.CreatorCommerceDesignSystem_0c16ec;
  const { useState } = React;
  const TITLES = { dashboard: "Dashboard", products: "Products", sales: "Sales", purchases: "Purchases", downloads: "Downloads", wishlist: "Wishlist", settings: "Settings", help: "Help" };

  function App() {
    const [screen, setScreen] = useState("dashboard");
    const [editing, setEditing] = useState(null); // productId | "new" | null

    let title = TITLES[screen] || "Dashboard";
    let content, actions = null;

    if (editing) {
      title = "Products";
      content = <ProductEditScreen NS={NS} productId={editing} onBack={() => setEditing(null)} />;
    } else if (screen === "dashboard") {
      content = <DashboardScreen NS={NS} />;
      actions = <NS.Button variant="outline" size="sm"><Icon name="external-link" size={14} />View storefront</NS.Button>;
    } else if (screen === "products") {
      content = <ProductsScreen NS={NS} onEdit={(id) => setEditing(id)} />;
    } else {
      content = <Placeholder screen={screen} />;
    }

    return (
      <AppShell current={editing ? "products" : screen} onNavigate={(s) => { setEditing(null); setScreen(s); }} title={title} actions={actions}>
        {content}
      </AppShell>
    );
  }

  function Placeholder({ screen }) {
    return (
      <div style={{ height: "100%", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 10, color: "var(--muted-foreground)", fontFamily: "var(--font-sans)" }}>
        <Icon name="construction" size={26} />
        <div style={{ fontSize: 15, fontWeight: 500, color: "var(--foreground)", textTransform: "capitalize" }}>{screen}</div>
        <div style={{ fontSize: 13 }}>This screen follows the same archetype — not built in this kit.</div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
