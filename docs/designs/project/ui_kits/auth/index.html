<!-- @dsCard group="Auth & Checkout" viewport="1280x760" name="Centered-card layouts" subtitle="Login, signup, and checkout success / cancel — one shell" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Creator Commerce — Auth &amp; Checkout</title>
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; height: 100%; }
  body { background: var(--muted); color: var(--foreground); font-family: var(--font-sans); }
  #root { min-height: 100vh; }
  a { color: var(--primary); text-decoration: none; }
  a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const NS = window.CreatorCommerceDesignSystem_0c16ec;
const { Button, Input, Label, Separator } = NS;
const { useState, useEffect, useRef } = React;

function toPascal(s){return s.split("-").map(w=>w[0].toUpperCase()+w.slice(1)).join("");}
function Icon({ name, size = 16, style }) {
  const ref = useRef(null);
  useEffect(() => {
    const h = ref.current; if (!h || !window.lucide) return;
    const node = (window.lucide.icons||{})[toPascal(name)]; h.innerHTML = "";
    if (node && window.lucide.createElement) { const s=window.lucide.createElement(node); s.setAttribute("width",size); s.setAttribute("height",size); s.style.display="block"; h.appendChild(s);}
  }, [name, size]);
  return <span ref={ref} style={{ display:"inline-flex", alignItems:"center", ...style }} />;
}
function Logo({ size=32 }) {
  return <svg width={size} height={size} viewBox="0 0 48 48" fill="none"><path d="M28 12 A12 12 0 1 0 28 36" stroke="var(--foreground)" strokeWidth="4.5" strokeLinecap="round" fill="none"/><path d="M32 16 A12 12 0 1 1 32 32" stroke="var(--primary)" strokeWidth="4.5" strokeLinecap="round" fill="none"/></svg>;
}

const fieldCol = { display:"flex", flexDirection:"column", gap:6 };
function Shell({ children }) {
  return (
    <div style={{ minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:24, gap:22 }}>
      <div style={{ display:"flex", alignItems:"center", gap:10 }}>
        <Logo /><span style={{ fontFamily:"var(--font-heading)", fontWeight:500, fontSize:18, letterSpacing:"-0.02em" }}>Creator<b style={{fontWeight:700}}>Commerce</b></span>
      </div>
      <div style={{ width:"100%", maxWidth:400, background:"var(--card)", borderRadius:"var(--radius-xl)", boxShadow:"var(--ring-card)", padding:28 }}>
        {children}
      </div>
    </div>
  );
}

function Login({ go }) {
  return (
    <Shell>
      <h1 style={{ fontFamily:"var(--font-heading)", fontWeight:500, fontSize:20, margin:"0 0 4px" }}>Welcome back</h1>
      <p style={{ fontSize:14, color:"var(--muted-foreground)", margin:"0 0 20px" }}>Sign in to your Creator Commerce account.</p>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div style={fieldCol}><Label htmlFor="e">Email</Label><Input id="e" type="email" placeholder="you@example.com" /></div>
        <div style={fieldCol}>
          <div style={{ display:"flex", justifyContent:"space-between" }}><Label htmlFor="p">Password</Label><a href="#" style={{ fontSize:13 }}>Forgot?</a></div>
          <Input id="p" type="password" defaultValue="password" />
        </div>
        <Button style={{ width:"100%", marginTop:4 }} onClick={() => go("success")}>Sign in</Button>
        <div style={{ display:"flex", alignItems:"center", gap:12, color:"var(--muted-foreground)", fontSize:12 }}>
          <Separator style={{ flex:1 }} />OR<Separator style={{ flex:1 }} />
        </div>
        <Button variant="outline" style={{ width:"100%" }}><Icon name="github" size={16} />Continue with GitHub</Button>
      </div>
      <p style={{ textAlign:"center", fontSize:14, color:"var(--muted-foreground)", margin:"20px 0 0" }}>
        New here? <a href="#" onClick={(e)=>{e.preventDefault();go("signup");}}>Create an account</a>
      </p>
    </Shell>
  );
}

function Signup({ go }) {
  return (
    <Shell>
      <h1 style={{ fontFamily:"var(--font-heading)", fontWeight:500, fontSize:20, margin:"0 0 4px" }}>Create your account</h1>
      <p style={{ fontSize:14, color:"var(--muted-foreground)", margin:"0 0 20px" }}>Claim your handle and start selling.</p>
      <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
        <div style={fieldCol}><Label htmlFor="n">Name</Label><Input id="n" placeholder="Gabi Ionescu" /></div>
        <div style={fieldCol}><Label htmlFor="e2">Email</Label><Input id="e2" type="email" placeholder="you@example.com" /></div>
        <div style={fieldCol}>
          <Label htmlFor="h">Storefront handle</Label>
          <div style={{ display:"flex", alignItems:"center", height:32, border:"1px solid var(--input)", borderRadius:"var(--radius-lg)", overflow:"hidden" }}>
            <span style={{ padding:"0 8px 0 10px", color:"var(--muted-foreground)", fontFamily:"var(--font-mono)", fontSize:13, background:"var(--muted)", height:"100%", display:"flex", alignItems:"center", borderRight:"1px solid var(--input)" }}>/@</span>
            <input defaultValue="gabi" style={{ border:0, outline:"none", flex:1, padding:"0 10px", fontFamily:"var(--font-sans)", fontSize:14, background:"transparent", color:"var(--foreground)" }} />
          </div>
        </div>
        <Button style={{ width:"100%", marginTop:4 }} onClick={() => go("success")}>Create account</Button>
      </div>
      <p style={{ textAlign:"center", fontSize:14, color:"var(--muted-foreground)", margin:"20px 0 0" }}>
        Already have an account? <a href="#" onClick={(e)=>{e.preventDefault();go("login");}}>Sign in</a>
      </p>
    </Shell>
  );
}

function Success({ go }) {
  return (
    <Shell>
      <div style={{ textAlign:"center", display:"flex", flexDirection:"column", alignItems:"center", gap:14 }}>
        <span style={{ width:52, height:52, borderRadius:9999, background:"color-mix(in oklch, var(--primary), transparent 88%)", color:"var(--primary)", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon name="check" size={26} /></span>
        <h1 style={{ fontFamily:"var(--font-heading)", fontWeight:500, fontSize:20, margin:0 }}>Payment confirmed</h1>
        <p style={{ fontSize:14, color:"var(--muted-foreground)", margin:0 }}>Thanks! <b style={{ color:"var(--foreground)" }}>Golden Hour Presets</b> is ready to download.</p>
        <Button style={{ width:"100%" }}><Icon name="download" size={16} />Go to downloads</Button>
        <a href="#" onClick={(e)=>{e.preventDefault();go("cancel");}} style={{ fontSize:13, color:"var(--muted-foreground)" }}>See the cancelled state</a>
      </div>
    </Shell>
  );
}

function Cancel({ go }) {
  return (
    <Shell>
      <div style={{ textAlign:"center", display:"flex", flexDirection:"column", alignItems:"center", gap:14 }}>
        <span style={{ width:52, height:52, borderRadius:9999, background:"var(--muted)", color:"var(--muted-foreground)", display:"flex", alignItems:"center", justifyContent:"center" }}><Icon name="x" size={26} /></span>
        <h1 style={{ fontFamily:"var(--font-heading)", fontWeight:500, fontSize:20, margin:0 }}>Checkout cancelled</h1>
        <p style={{ fontSize:14, color:"var(--muted-foreground)", margin:0 }}>No charge was made. You can pick up where you left off.</p>
        <Button style={{ width:"100%" }}>Back to product</Button>
        <a href="#" onClick={(e)=>{e.preventDefault();go("login");}} style={{ fontSize:13, color:"var(--muted-foreground)" }}>Back to sign in</a>
      </div>
    </Shell>
  );
}

function App() {
  const [view, setView] = useState("login");
  const TABS = [["login","Login"],["signup","Signup"],["success","Checkout ✓"],["cancel","Checkout ✕"]];
  const V = { login: Login, signup: Signup, success: Success, cancel: Cancel }[view];
  return (
    <div>
      {/* kit-only view switcher */}
      <div style={{ position:"fixed", top:14, left:"50%", transform:"translateX(-50%)", zIndex:50, display:"flex", gap:3, background:"var(--card)", border:"1px solid var(--border)", borderRadius:"var(--radius-lg)", padding:3, boxShadow:"var(--ring-card)" }}>
        {TABS.map(([id,label]) => (
          <button key={id} onClick={()=>setView(id)} style={{ border:0, cursor:"pointer", height:26, padding:"0 12px", borderRadius:"var(--radius-md)", fontFamily:"var(--font-sans)", fontSize:12, fontWeight:500, background: view===id?"var(--primary)":"transparent", color: view===id?"var(--primary-foreground)":"var(--muted-foreground)" }}>{label}</button>
        ))}
      </div>
      <V go={setView} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
